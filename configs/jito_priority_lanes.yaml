# Jito Priority Lanes Configuration
# Defines dynamic tip and priority lane parameters

jito_priority:
  base_tip_lamports: 1000  # 0.000001 SOL base tip
  congestion_multiplier: 5000  # Multiplier for congestion-based tip increase
  max_budget_sol: 10.0  # Maximum allowed tip budget

landing_simulation:
  baseline_success_rate: 0.95  # Base landing success rate
  congestion_penalty_factor: 0.3  # How much congestion reduces success
  tip_efficiency_factor: 2.0  # How much tip efficiency boosts success

priority_lanes:
  baseline:
    congestion_threshold: 0.3
    tip_multiplier: 1.0
    expected_improvement_pct: 5.0
  elevated:
    congestion_threshold: 0.7
    tip_multiplier: 1.5
    expected_improvement_pct: 15.0
  congested:
    congestion_threshold: 1.0
    tip_multiplier: 2.0
    expected_improvement_pct: 30.0