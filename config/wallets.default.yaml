wallets:
  enabled: true

input:
  path: data/smart_wallets.raw.json
  format: json
  allow_missing_optional_fields: true

registry:
  output_path: data/smart_wallets.registry.json
  deduplicate: true
  keep_highest_score_on_duplicate: true
  normalize_addresses: true
  drop_inactive: false
  drop_quarantine: true

tiers:
  tier_1_weight: 1.00
  tier_2_weight: 0.60
  tier_3_weight: 0.25

scoring:
  weighting_mode: additive
  tier1_bonus_score: 3.0
  tier2_bonus_score: 1.0
  early_entry_bonus_score: 2.0
  negative_netflow_penalty: 3.0
  max_wallet_bonus_score: 6.0
  require_wallets_for_entry: false

features:
  early_entry_window_sec: 120
  min_wallet_hits_for_signal: 1
  compute_netflow_bias: true

replay:
  support_weighting_toggle: true
  emit_wallet_feature_stats: true
