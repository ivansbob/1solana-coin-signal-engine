chain: solana
days: 7
seed: 42

discovery:
  source: dexscreener
  chain_id: solana
  age_sec_max: 600
  liquidity_usd_min: 20000
  txns_m5_min: 20
  require_fdv_or_market_cap: true
  exclude_paid_orders: true
  shortlist_max: 5

x_mode:
  status: degraded
  baseline_score: 45
  baseline_delta: 0

backfill:
  provider: helius_rpc
  max_signatures_per_address: 200
  request_timeout_sec: 20
  max_rps: 5
  cache_enabled: true
  collect_price_paths: true
  price_history_enabled: true
  price_history_provider: geckoterminal_pool_ohlcv
  price_path_window_sec: 14400
  price_path_window_max_sec: 28800
  price_interval_sec: 60
  price_interval_fallbacks: [300, 900]
  price_path_window_fallback_multipliers: [4, 8]
  price_path_prelaunch_buffer_sec: 300
  price_path_try_pairless: true
  price_path_min_points: 2
  price_path_require_nonempty: true
  price_path_retry_attempts: 12
  gecko_min_request_interval_sec: 0.25
  gecko_rate_limit_cooldown_sec: 120
  gecko_ohlcv_404_negative_ttl_sec: 1800
  gecko_max_pages_per_token: 12
  gecko_pool_candidate_limit: 3
  gecko_try_seeded_pair_first: true
  gecko_try_alternate_pools_on_ohlcv_404: true
  gecko_stop_after_provider_family_exhausted: true
  gecko_transport_strategy: sample_first
  gecko_target_usable_rows_per_run: 5
  gecko_max_tokens_per_run: 20
  gecko_stop_after_target_usable_rows: true
  gecko_skip_retryable_after_global_cooldown: true
  gecko_non_retryable_ttl_sec: 21600
  gecko_request_timeout_sec: 20
  gecko_max_consecutive_failures: 8
  price_path_stop_after_non_retryable_provider_failure: true
  price_history_router:
    enabled: true
    provider_order: [birdeye_ohlcv_v3, geckoterminal_pool_ohlcv]
    cross_provider_fallback_on_retryable: true
    accept_partial_usable: true
    max_routes_per_token: 4
  enrich_time_anchor: true
  time_anchor_field_priority:
    - price_path_start_ts
    - replay_entry_time
    - entry_time
    - opened_at
    - signal_timestamp
    - first_seen_at
    - discovered_at
    - launch_ts
    - pair_created_at
    - pair_created_at_ts
    - first_trade_at
    - block_times
    - signatures[].blockTime
  time_anchor_use_block_times: true
  time_anchor_use_signature_hydration: true
  time_anchor_signature_limit: 25
  time_anchor_require_earliest: true
  time_anchor_prelaunch_buffer_sec: 300
  time_anchor_window_sec: 900
  time_anchor_allow_replay_entry_time: true

providers:
  price_history:
    provider: geckoterminal_pool_ohlcv
    base_url: https://api.geckoterminal.com/api/v2
    token_endpoint: networks/{network}/tokens/{token_address}/pools
    pair_endpoint: networks/{network}/pools/{pool_address}/ohlcv/{timeframe}
    chain: solana
    currency: usd
    include_empty_intervals: true
    pool_resolver: geckoterminal
    resolver_cache_ttl_sec: 86400
    max_ohlcv_limit: 1000
    request_version: 20230302
    require_pair_address: false
    allow_pairless_token_lookup: true


simulation:
  max_open_positions: 1
  max_trades_per_day: 20
  position_size_mode: fixed
  fixed_position_size_usd: 100
  slippage_pct_model: 0.02
  priority_fee_sol_model: 0.0
  failed_tx_probability_model: 0.0

output:
  base_dir: runs
  write_jsonl: true
  write_summary_md: true
  write_summary_json: true

wallets:
  enabled: true
  file: data/smart_wallets.json
  weighting_mode: simple
