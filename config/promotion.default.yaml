runtime:
  mode: shadow
  chain: solana
  loop_interval_sec: 30
  seed: 42
  runtime_market_cache_ttl_sec: 21600
  runtime_market_cache_max_entries: 512

modes:
  shadow:
    open_positions: false
    simulate_entries: true
    simulate_exits: true

  constrained_paper:
    open_positions: true
    max_open_positions: 1
    max_trades_per_day: 10
    position_size_scale: 0.50
    allow_regimes: [SCALP]
    degraded_x_policy: watchlist_only

  expanded_paper:
    open_positions: true
    max_open_positions: 2
    max_trades_per_day: 20
    position_size_scale: 1.00
    allow_regimes: [SCALP, TREND]
    degraded_x_policy: reduced_size

  paused:
    open_positions: false
    simulate_entries: false
    simulate_exits: false

safety:
  kill_switch_file: runs/runtime/kill_switch.flag
  max_daily_loss_pct: 8.0
  max_consecutive_losses: 4
  max_position_hold_sec: 7200
  require_config_hash: true

x_protection:
  captcha_cooldown_trigger_count: 2
  captcha_cooldown_minutes: 30
  soft_ban_cooldown_minutes: 30
  timeout_cooldown_trigger_count: 5
  timeout_cooldown_minutes: 15

degraded_x:
  baseline_score: 45
  allow_shadow: true
  allow_constrained_paper: true
  allow_expanded_paper: true
  constrained_policy: watchlist_only
  expanded_policy: reduced_size

state:
  runs_dir: runs
  state_dir: runs/runtime_state
  write_session_state: true
  write_event_log: true
  write_daily_summary: true

market_realism:
  discovery_lag_honesty_enabled: true
  discovery_provider_mode: fallback_search
  discovery_allow_dex_search_fallback: true
  discovery_require_native_first_window_for_trend: true
  discovery_post_first_window_scalp_max_lag_sec: 120
  discovery_lag_trend_block_sec: 60
  discovery_lag_scalp_size_reduction_sec: 45
  discovery_post_first_window_hard_block_enabled: true
  discovery_lag_score_penalty: 6.0
  discovery_lag_size_multiplier: 0.60
  tx_window_coverage_enforced: true
  friction_model_mode: amm_approx
  congestion_stress_enabled: true
  friction_thin_depth_dex_ids: [meteora, orca_whirlpool, raydium_clmm]
  friction_thin_depth_pair_types: [clmm, dlmm, concentrated]
  friction_thin_depth_liquidity_multiplier: 0.65
  friction_thin_depth_stress_sell_multiplier: 0.70
  friction_catastrophic_liquidity_ratio: 1.15
  friction_catastrophic_filled_fraction: 0.15
  friction_catastrophic_slippage_bps: 2500
  bundle_quote_symbol_allowlist: [USDC, USDT, WSOL]
  enable_token_2022_safety: true
