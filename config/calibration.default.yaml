input:
  replay_run_id: smoke_replay
  runs_dir: runs

seed: 42

splits:
  mode: by_day
  train_days: 5
  validation_days: 2
  require_non_overlapping: true

selection:
  primary_metric: validation_expectancy
  secondary_metrics:
    - validation_median_pnl
    - validation_winrate
  min_trades_total: 10
  min_trades_per_regime: 3
  require_baseline_outperformance: true

baseline:
  scalp_final_score_min: 82
  trend_final_score_min: 86
  buy_pressure_min: 0.75
  volume_velocity_min: 4.0
  rug_score_max_scalp: 0.30
  rug_score_max_trend: 0.20
  smart_wallet_hits_min: 2
  scalp_velocity_decay_ratio: 0.70
  scalp_buy_pressure_fail: 0.60
  scalp_max_hold_sec: 120
  trend_partial_1_pct: 35
  trend_partial_2_pct: 100
  trend_buy_pressure_fail: 0.50
  trend_liquidity_drop_fail_pct: 25

grid:
  scalp_final_score_min: [80, 82, 84]
  trend_final_score_min: [84, 86, 88]
  buy_pressure_min: [0.72, 0.75, 0.78]
  volume_velocity_min: [3.5, 4.0, 4.5]
  rug_score_max_scalp: [0.25, 0.30]
  rug_score_max_trend: [0.18, 0.20]
  smart_wallet_hits_min: [1, 2]
  scalp_velocity_decay_ratio: [0.65, 0.70, 0.75]
  scalp_buy_pressure_fail: [0.55, 0.60, 0.65]
  scalp_max_hold_sec: [90, 120]
  trend_partial_1_pct: [25, 35, 45]
  trend_partial_2_pct: [80, 100, 120]
  trend_buy_pressure_fail: [0.45, 0.50, 0.55]
  trend_liquidity_drop_fail_pct: [20, 25, 30]

output:
  write_json: true
  write_md: true
  write_csv: true
